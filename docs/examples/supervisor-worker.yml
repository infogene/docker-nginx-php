# Background worker / job (no web server) via --start-supervisor-cli.
# Example: a Symfony Messenger consumer, automatically restarted.
# Options placed AFTER a --supervisor-program override THAT program (here
# startretries=10); placed before the 1st program, they become global defaults
# for all programs.
#
#   docker compose -f supervisor-worker.yml up
services:
  app:
    image: ghcr.io/infogene/nginx-php:latest
    # build:
    #   context: ../..
    #   dockerfile: Dockerfile.alpine
    command:
      - --start-supervisor-cli

      - --supervisor-program
      - php bin/console messenger:consume async --time-limit=3600
      - --supervisor-program-name
      - messenger
      - --supervisor-startretries
      - "10"
    # The worker runs YOUR application's code: mount it here.
    volumes:
      - ./:/application
