# Backend par défaut : Nginx + PHP-FPM, supervisés séparément.
# Sert /application/public via le vhost Symfony-friendly (fastcgi -> 127.0.0.1:9000).
#
#   docker compose -f backend-nginx-phpfpm.yml up
#   -> http://localhost:8080
services:
  app:
    image: ghcr.io/infogene/nginx-php:latest
    # Pour tester depuis les sources du dépôt :
    # build:
    #   context: ../..
    #   dockerfile: Dockerfile.alpine
    ports:
      - "8080:8080"
    command:
      - --start-backend
    # Montez votre application (sinon le phpinfo() intégré à l'image est servi) :
    # volumes:
    #   - ./:/application
