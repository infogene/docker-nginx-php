services:
  app:
    # Build de l'image de base du dépôt : elle embarque désormais l'ENTRYPOINT
    # standard (bin/docker-entrypoint) + le générateur bin/docker-supervisor-cli.
    build:
      context: ..
      dockerfile: Dockerfile.alpine
    container_name: mycustom-supervisor
    expose:
      - 8080
    ports:
      - "18080:8080"
    # Commande minimale : --start-supervisor-cli + un --supervisor-program par service.
    # nginx et php-fpm sont supervisés SÉPARÉMENT (restart indépendant, pas de wrapper).
    # Toutes les autres options --supervisor-* ont des défauts (user=www-data, autostart,
    # autorestart, stop/kill-as-group, logs vers stdout/stderr...) -> surchargeables.
#    command:
#      - --start-backend
#
#      - --supervisor-program
#      - php-fpm -F
#      - --supervisor-program-name
#      - php-fpm
#
#      - --supervisor-program
#      - nginx -g "daemon off;"
#      - --supervisor-program-name
#      - nginx

    # L'image contient déjà /application/public/index.php (phpinfo).
    # Montez votre app ici pour servir votre propre code :
    # volumes:
    #   - ./:/application
