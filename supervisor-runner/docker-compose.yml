services:
  app:
    # Build de l'image de base du dépôt : elle embarque désormais l'ENTRYPOINT
    # standard (bin/docker-entrypoint) + le générateur bin/docker-supervisor-cli.
    build:
      context: ..
      dockerfile: Dockerfile.alpine
    container_name: mycustom-supervisor
    expose:
      - 8080
    ports:
      - "18080:8080"
    # --start-backend SANS argument -> défaut Nginx + PHP-FPM.
    # AVEC un argument -> surcharge la commande du backend (ici serveur PHP intégré).
    # (idem --start-frontend "<cmd>").
    command:
      - --start-backend
      - php -S 0.0.0.0:8080 -t /application/public

    # L'image contient déjà /application/public/index.php (phpinfo).
    # Montez votre app ici pour servir votre propre code :
    # volumes:
    #   - ./:/application
